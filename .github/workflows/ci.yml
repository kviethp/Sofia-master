name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  scaffold-checks:
    runs-on: ubuntu-latest
    env:
      SOFIA_EXECUTION_MODE: scaffold
      SOFIA_REPORT_CHANNEL: disabled
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release Readiness
        run: pnpm release:readiness

      - name: Doctor
        run: pnpm doctor

      - name: Preflight
        run: pnpm preflight

      - name: Smoke
        run: pnpm smoke
