version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: sofia
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    command: node apps/sofia-api/src/index.js
    environment:
      SOFIA_API_PORT: "8080"
      SOFIA_DATABASE_URL: postgres://postgres:postgres@postgres:5432/sofia
      SOFIA_REDIS_URL: redis://redis:6379
      SOFIA_EXECUTION_MODE: scaffold
      SOFIA_REPORT_CHANNEL: disabled
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    command: node apps/sofia-web/src/index.js
    environment:
      SOFIA_WEB_PORT: "3000"
      SOFIA_API_BASE_URL: http://api:8080
    depends_on:
      - api
    ports:
      - "3000:3000"
  admin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    command: node apps/sofia-admin/src/index.js
    environment:
      SOFIA_ADMIN_PORT: "3001"
      SOFIA_API_BASE_URL: http://api:8080
    depends_on:
      - api
    ports:
      - "3001:3001"
  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    command: node scripts/worker-loop.mjs
    environment:
      SOFIA_WORKER_LOOP: "true"
      SOFIA_WORKER_IDLE_SLEEP_MS: "1000"
      SOFIA_WORKER_POLL_INTERVAL_MS: "1000"
      SOFIA_DATABASE_URL: postgres://postgres:postgres@postgres:5432/sofia
      SOFIA_REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    profiles:
      - worker
  approval-poller:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    command: node scripts/approval-poller-loop.mjs
    environment:
      SOFIA_DATABASE_URL: postgres://postgres:postgres@postgres:5432/sofia
      SOFIA_REDIS_URL: redis://redis:6379
      SOFIA_EXECUTION_MODE: scaffold
      SOFIA_REPORT_CHANNEL: disabled
      SOFIA_APPROVAL_POLL_INTERVAL_MS: "5000"
    depends_on:
      - postgres
      - redis
    profiles:
      - approvals
